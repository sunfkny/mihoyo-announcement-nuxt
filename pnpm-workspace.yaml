minimumReleaseAge: 0
shellEmulator: true
trustPolicy: no-downgrade
# https://github.com/pnpm/pnpm/issues/11887
trustPolicyExclude:
  - chokidar@4.0.3
  - concurrently@10.0.0
  - semver@6.3.1
  - tinyclip@0.1.13
  - tinyexec@1.2.2
overrides:
  vite: ">=8.0.14"
allowBuilds:
  "@parcel/watcher": true
  esbuild: true
  unrs-resolver: true
  vue-demi: true
